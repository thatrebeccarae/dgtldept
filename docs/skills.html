/* ─── RESET & BASE ─── */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --accent: #5B5F8D;
  --black: #000000;
  --white: #ffffff;
  --terminal-bg: #0d0f14;
  --terminal-green: #4ade80;
  --terminal-red: #ef4444;
  --terminal-amber: #f59e0b;
  --terminal-text: #e4e4e7;
  --border-width: 2px;
  --section-pad-y: clamp(80px, 12vw, 200px);
  --section-pad-x: clamp(40px, 5vw, 80px);
  --ease: cubic-bezier(0.215, 0.61, 0.355, 1);
  --grid-cols: 12;
  --grid-gap: 20px;
}

html {
  scroll-behavior: auto;
  scroll-padding-top: 60px;
  -webkit-text-size-adjust: 100%;
}

html[data-theme="dark"] {
  --theme-bg: #000000;
  --theme-color: #ffffff;
  --theme-bg-rgb: 0,0,0;
}

html {
  background-color: var(--theme-bg);
  color: var(--theme-color);
}

body {
  font-family: 'Switzer', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: clamp(15px, 1.1vw, 17px);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
  max-width: 100vw;
}

::selection {
  background: var(--theme-color);
  color: var(--theme-bg);
}

a {
  color: inherit;
  text-decoration: none;
}

/* ─── TYPOGRAPHY ─── */
.display {
  font-family: 'PP Editorial New', 'Georgia', serif;
  font-size: clamp(2rem, 4.5vw, 6.5rem);
  font-weight: 200;
  line-height: 1.12;
  letter-spacing: -0.014em;
}

.subtitle {
  font-size: clamp(0.875rem, 1.2vw, 1.125rem);
  font-weight: 300;
  line-height: 1.55;
}

.section-label {
  font-size: 14px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.13em;
  margin-bottom: 2rem;
}

.muted {
  opacity: 0.5;
}

/* ─── HEADER ─── */
.site-header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  padding: 1.2rem var(--section-pad-x);
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: transform 0.3s var(--ease), background-color 0.3s var(--ease), backdrop-filter 0.3s var(--ease);
}

.site-header.scrolled {
  background-color: rgba(var(--theme-bg-rgb), 0.85);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

.header-logo {
  font-weight: 600;
  font-size: 1rem;
  color: var(--theme-color);
}

.header-nav {
  display: flex;
  gap: 2.5rem;
  align-items: center;
}

.header-nav a {
  font-family: 'Cartograph CF', monospace;
  font-size: 0.75rem;
  font-weight: 400;
  color: var(--theme-color);
  text-transform: uppercase;
  transition: opacity 0.2s var(--ease);
}
.header-nav a:hover {
  opacity: 0.7;
}

.header-github {
  font-family: 'Cartograph CF', monospace;
  font-size: 0.75rem;
  font-weight: 400;
  color: var(--theme-color);
  text-transform: uppercase;
  transition: opacity 0.2s var(--ease), color 0.4s var(--ease);
}
.header-github:hover {
  opacity: 0.7;
}

.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  background: none;
  border: none;
  padding: 4px;
}
.hamburger span {
  display: block;
  width: 22px;
  height: 2px;
  background: var(--theme-color);
  transition: transform 0.3s var(--ease), opacity 0.3s var(--ease);
}
.hamburger.open span:nth-child(1) {
  transform: translateY(7px) rotate(45deg);
}
.hamburger.open span:nth-child(2) {
  opacity: 0;
}
.hamburger.open span:nth-child(3) {
  transform: translateY(-7px) rotate(-45deg);
}

.mobile-nav {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: var(--black);
  z-index: 999;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2rem;
}
.mobile-nav.open {
  display: flex;
}
.mobile-nav a {
  font-size: 1.5rem;
  font-weight: 500;
  color: var(--white);
}

/* ─── HERO (COMPACT) ─── */
.catalog-hero {
  padding: 140px var(--section-pad-x) 40px;
}

.catalog-hero .display {
  margin-bottom: 1rem;
}

.catalog-hero .subtitle {
  opacity: 0.6;
}

/* ─── SEARCH ─── */
.search-bar {
  padding: 0 var(--section-pad-x) 1.5rem;
}

.search-input {
  width: 100%;
  max-width: 400px;
  padding: 0.75rem 1.25rem;
  background: transparent;
  border: 1px solid #ffffff;
  border-radius: 45px;
  color: #ffffff;
  font-family: 'Cartograph CF', monospace;
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  outline: none;
  transition: border-color 0.2s var(--ease);
}
.search-input::placeholder {
  color: rgba(255,255,255,0.35);
  text-transform: uppercase;
}
.search-input:focus {
  border-width: 2px;
  padding: calc(0.75rem - 1px) calc(1.25rem - 1px);
}

.search-results {
  padding: 0 var(--section-pad-x) 2rem;
  display: none;
}
.search-results.active {
  display: block;
}
.search-results-list {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: var(--grid-gap);
}
.search-result-item {
  display: block;
  background: #000000;
  border: 1px solid #ffffff;
  border-radius: 12px;
  padding: 1.5rem 2rem;
  text-decoration: none;
  color: #ffffff;
  transition: border-width 0.2s var(--ease), transform 0.2s var(--ease);
}
.search-result-item:hover {
  border-width: 2px;
  padding: calc(1.5rem - 1px) calc(2rem - 1px);
  transform: translateY(-2px);
}
.search-result-title {
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: 0.5rem;
}
.search-result-excerpt {
  font-size: 0.85rem;
  font-weight: 300;
  line-height: 1.55;
  opacity: 0.7;
}
.search-result-excerpt mark {
  background: rgba(91, 95, 141, 0.3);
  color: #ffffff;
  padding: 0 2px;
  border-radius: 2px;
}
.search-no-results {
  font-family: 'Cartograph CF', monospace;
  font-size: 0.85rem;
  text-transform: uppercase;
  opacity: 0.4;
  padding: 2rem 0;
}

@media (max-width: 1280px) {
  .search-results-list {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}
@media (max-width: 700px) {
  .search-results-list {
    grid-template-columns: 1fr;
  }
}

/* ─── FILTER PILLS ─── */
.filter-bar {
  padding: 0 var(--section-pad-x) 2rem;
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
}

.filter-pill {
  font-family: 'Cartograph CF', monospace;
  font-size: 0.8rem;
  font-weight: 500;
  text-transform: uppercase;
  padding: 0.75rem 1.25rem;
  border: 1px solid #ffffff;
  border-radius: 45px;
  color: #ffffff;
  background: transparent;
  cursor: pointer;
  transition: background 0.2s var(--ease), color 0.2s var(--ease);
}

.filter-pill:hover {
  background: rgba(255,255,255,0.15);
}

.filter-pill.active {
  background: #ffffff;
  color: #000000;
  border-color: #ffffff;
}

.filter-pill.active:hover {
  background: rgba(255,255,255,0.85);
}

/* ─── CARD GRID ─── */
.catalog-grid {
  padding: 0 var(--section-pad-x) var(--section-pad-y);
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: var(--grid-gap);
}

.skill-card {
  display: flex;
  flex-direction: column;
  background: #000000;
  border: 1px solid #ffffff;
  border-radius: 12px;
  padding: 1.5rem 2rem;
  text-decoration: none;
  color: var(--theme-color);
  transition: border-color 0.3s var(--ease), transform 0.2s var(--ease);
  min-height: 200px;
}

.skill-card:hover {
  border-width: 2px;
  padding: calc(1.5rem - 1px) calc(2rem - 1px);
  transform: translateY(-2px);
}

.skill-card-name {
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: 0.4rem;
  line-height: 1.3;
}

.skill-card-category {
  font-family: 'Cartograph CF', monospace;
  font-size: 0.75rem;
  font-weight: 400;
  text-transform: uppercase;
  opacity: 0.6;
  margin-bottom: 0.75rem;
  letter-spacing: 0.04em;
}

.skill-card-desc {
  font-size: 0.9rem;
  font-weight: 300;
  line-height: 1.55;
  opacity: 0.8;
  flex: 1;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.skill-card-meta {
  margin-top: 1rem;
  padding-top: 0.75rem;
  border-top: 1px solid rgba(255,255,255,0.06);
  display: flex;
  flex-direction: column;
  gap: 0.35rem;
}

.skill-card-tested {
  font-family: 'Cartograph CF', monospace;
  font-size: 0.7rem;
  font-weight: 400;
  opacity: 0.55;
  text-transform: uppercase;
}

.skill-card-install {
  font-family: 'Cartograph CF', monospace;
  font-size: 0.65rem;
  font-weight: 400;
  opacity: 0.45;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}

.skill-card-install-row {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.copy-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 2px;
  opacity: 0.45;
  transition: opacity 0.2s var(--ease);
  flex-shrink: 0;
  color: var(--theme-color);
}
.copy-btn:hover {
  opacity: 0.7;
}
.copy-btn.copied {
  opacity: 1;
  color: var(--terminal-green);
}

/* ─── EMPTY STATE ─── */
.catalog-empty {
  grid-column: 1 / -1;
  text-align: center;
  padding: 4rem 2rem;
  opacity: 0.4;
  font-family: 'Cartograph CF', monospace;
  font-size: 0.9rem;
  text-transform: uppercase;
}

/* ─── LOADING STATE ─── */
.catalog-loading {
  grid-column: 1 / -1;
  text-align: center;
  padding: 6rem 2rem;
  font-family: 'Cartograph CF', monospace;
  font-size: 0.85rem;
  text-transform: uppercase;
  opacity: 0.5;
  letter-spacing: 0.05em;
}

.catalog-loading::after {
  content: '';
  display: inline-block;
  width: 8px;
  height: 1.1em;
  background: var(--accent);
  vertical-align: text-bottom;
  margin-left: 4px;
  animation: blink 1s step-end infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

/* ─── MODAL ─── */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.85);
  z-index: 2000;
  align-items: center;
  justify-content: center;
  padding: clamp(20px, 4vw, 60px);
  overflow-y: auto;
}
.modal-overlay.open {
  display: flex;
}

.modal-content {
  background: #000000;
  border: 1px solid #ffffff;
  border-radius: 12px;
  max-width: 720px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  padding: clamp(1.5rem, 4vw, 2.5rem);
  position: relative;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.15) transparent;
}
.modal-content::-webkit-scrollbar {
  width: 4px;
}
.modal-content::-webkit-scrollbar-track {
  background: transparent;
}
.modal-content::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.15);
  border-radius: 2px;
}

.modal-close {
  position: sticky;
  top: 0;
  float: right;
  background: none;
  border: none;
  color: #ffffff;
  cursor: pointer;
  font-size: 1.5rem;
  padding: 0.25rem 0.5rem;
  opacity: 0.5;
  transition: opacity 0.2s var(--ease);
  z-index: 1;
}
.modal-close:hover {
  opacity: 1;
}

.modal-body {
  color: #ffffff;
}
.modal-body .detail-page {
  padding: 0;
  max-width: none;
}
.modal-body .detail-back {
  display: none;
}

/* ─── DETAIL PAGE (inside modal) ─── */
.modal-body .detail-page {
  padding: 0;
  max-width: none;
}
.modal-body .detail-back {
  display: none;
}

.detail-name {
  font-family: 'PP Editorial New', 'Georgia', serif;
  font-size: clamp(1.75rem, 3.5vw, 2.75rem);
  font-weight: 200;
  line-height: 1.15;
  letter-spacing: -0.014em;
  margin-bottom: 0.5rem;
}

.detail-category {
  font-family: 'Cartograph CF', monospace;
  font-size: 0.8rem;
  text-transform: uppercase;
  opacity: 0.5;
  letter-spacing: 0.04em;
  margin-bottom: 1.5rem;
}

.detail-desc {
  font-size: 1rem;
  font-weight: 300;
  line-height: 1.65;
  margin-bottom: 2rem;
  opacity: 1;
}

.detail-install {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  padding: 1rem 1.25rem;
  margin-bottom: 1.5rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.detail-install code {
  font-family: 'Cartograph CF', monospace;
  font-size: 0.7rem;
  opacity: 0.55;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.detail-install .copy-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
  opacity: 0.5;
  transition: opacity 0.2s var(--ease);
  color: #ffffff;
  flex-shrink: 0;
}
.detail-install .copy-btn:hover { opacity: 0.8; }
.detail-install .copy-btn.copied { opacity: 1; color: var(--terminal-green); }

.detail-tested {
  font-family: 'Cartograph CF', monospace;
  font-size: 0.7rem;
  text-transform: uppercase;
  opacity: 0.4;
  margin-bottom: 2rem;
}

.detail-capabilities h2,
.detail-sources h2,
.detail-body h2 {
  font-family: 'Cartograph CF', monospace;
  font-size: 0.8rem;
  font-weight: 400;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 0.75rem;
  margin-top: 2rem;
  opacity: 0.6;
}

.detail-capabilities ul {
  list-style: none;
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-bottom: 1.5rem;
}

.detail-capabilities li {
  font-family: 'Cartograph CF', monospace;
  font-size: 0.7rem;
  text-transform: uppercase;
  padding: 0.35rem 0.7rem;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 4px;
  opacity: 0.7;
}

.detail-source-links {
  display: flex;
  flex-wrap: wrap;
  gap: 0.75rem;
  margin-bottom: 1.5rem;
}

.detail-source-links a {
  font-family: 'Cartograph CF', monospace;
  font-size: 0.75rem;
  text-transform: uppercase;
  padding: 0.4rem 0.9rem;
  border: 1px solid #ffffff;
  border-radius: 45px;
  transition: background 0.2s var(--ease), color 0.2s var(--ease);
}
.detail-source-links a:hover {
  background: #ffffff;
  color: #000000;
}

.detail-body {
  margin-top: 2rem;
  border-top: 1px solid rgba(255,255,255,0.1);
  padding-top: 1.5rem;
}

.detail-body h2 {
  font-family: 'Switzer', sans-serif;
  font-size: 1rem;
  font-weight: 600;
  opacity: 1;
}

.detail-body h3 {
  font-size: 0.95rem;
  font-weight: 600;
  margin-top: 1.25rem;
  margin-bottom: 0.4rem;
}

.detail-body p {
  margin-bottom: 0.75rem;
  opacity: 0.8;
  line-height: 1.6;
  font-size: 0.9rem;
}

.detail-body ul {
  margin-bottom: 0.75rem;
  padding-left: 1.25rem;
}

.detail-body li {
  margin-bottom: 0.25rem;
  opacity: 0.8;
  line-height: 1.5;
  font-size: 0.9rem;
}

.detail-body pre {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  padding: 0.75rem 1rem;
  margin-bottom: 0.75rem;
  overflow-x: auto;
}

.detail-body code {
  font-family: 'Cartograph CF', monospace;
  font-size: 0.8rem;
}

.detail-body blockquote {
  border-left: 2px solid rgba(255,255,255,0.2);
  padding-left: 1rem;
  margin-bottom: 0.75rem;
  opacity: 0.65;
  font-style: italic;
}

/* ─── SCROLL REVEAL (disabled on catalog — cards load instantly) ─── */

/* ─── FOOTER ─── */
.site-footer {
  padding: clamp(40px, 4vw, 60px) clamp(40px, 5vw, 80px) 2rem;
  background: #000000;
  color: #ffffff;
}

.footer-handle {
  width: calc(100% + clamp(80px, 10vw, 160px));
  margin-left: calc(-1 * clamp(40px, 5vw, 80px));
  margin-bottom: 3rem;
}
.footer-handle svg {
  width: 100%;
  height: auto;
  display: block;
}
.footer-handle svg path {
  fill: #ffffff;
}

.footer-bottom {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2rem;
  padding-bottom: 3rem;
}

.footer-socials {
  display: flex;
  flex-wrap: wrap;
  gap: 1.5rem;
  align-items: center;
}
.footer-socials a {
  font-family: 'Cartograph CF', monospace;
  font-size: 0.85rem;
  font-weight: 400;
  text-transform: uppercase;
  color: #ffffff;
  transition: opacity 0.2s var(--ease);
}
.footer-socials a:hover {
  opacity: 0.7;
}

.footer-cta {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 2rem;
}

.footer-cta-text {
  font-family: 'PP Editorial New', 'Georgia', serif;
  font-size: clamp(1.5rem, 2.5vw, 2.5rem);
  font-weight: 200;
  line-height: 1.2;
  text-align: right;
}

.footer-cta-btn {

<script>
(function () {
  /* ─── HEADER SCROLL ─── */
  const header = document.getElementById('site-header');
  let lastY = 0;
  window.addEventListener('scroll', () => {
    header.classList.toggle('scrolled', window.scrollY > 40);
    lastY = window.scrollY;
  }, { passive: true });

  /* ─── MOBILE NAV ─── */
  const hamburger = document.getElementById('hamburger');
  const mobileNav = document.getElementById('mobile-nav');
  hamburger.addEventListener('click', () => {
    hamburger.classList.toggle('open');
    mobileNav.classList.toggle('open');
  });
  window.closeMobileNav = function () {
    hamburger.classList.remove('open');
    mobileNav.classList.remove('open');
  };

  /* ─── CATALOG ─── */
  const grid = document.getElementById('catalog-grid');
  const filterBar = document.getElementById('filter-bar');
  const countEl = document.getElementById('skill-count');
  let allSkills = [];
  let activeCategory = 'all';
  let catMap = {};

  fetch('./catalog.json')
    .then(r => {
      if (!r.ok) throw new Error(r.status);
      return r.json();
    })
    .then(data => {
      allSkills = Array.isArray(data) ? data : (data.skills || []);
      init();
    })
    .catch(() => {
      grid.innerHTML = '<div class="catalog-empty">Could not load catalog.json</div>';
      countEl.textContent = '';
    });

  function init() {
    /* Build category pills — use category_label for display, category for filtering */
    catMap = {};
    allSkills.forEach(s => { if (s.category) catMap[s.category] = s.category_label || s.category; });
    const catKeys = Object.keys(catMap).sort((a, b) => {
      const oa = allSkills.find(s => s.category === a);
      const ob = allSkills.find(s => s.category === b);
      return (oa?.category_order || 99) - (ob?.category_order || 99);
    });
    catKeys.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'filter-pill';
      btn.dataset.category = cat;
      btn.textContent = catMap[cat];
      filterBar.appendChild(btn);
    });

    filterBar.addEventListener('click', e => {
      const pill = e.target.closest('.filter-pill');
      if (!pill) return;
      activeCategory = pill.dataset.category;
      filterBar.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      render();
    });

    render();
  }

  function render() {
    const filtered = activeCategory === 'all'
      ? allSkills
      : allSkills.filter(s => s.category === activeCategory);

    countEl.textContent = activeCategory === 'all'
      ? filtered.length + ' skills'
      : filtered.length + ' skill' + (filtered.length !== 1 ? 's' : '') + ' in ' + (catMap[activeCategory] || activeCategory);

    if (!filtered.length) {
      grid.innerHTML = '<div class="catalog-empty">No skills found</div>';
      return;
    }

    grid.innerHTML = filtered.map((skill, i) => {
      const slug = skill.slug || skill.name;
      const href = './skill/' + slug + '.html';
      const tested = skill.tested ? 'Tested ' + skill.tested + (skill.tested_with ? ' · ' + skill.tested_with : '') : '';
      const install = skill.install_command || skill.install || ('cp -r claude-marketing/skills/' + slug + ' ~/.claude/skills/');
      return '<a class="skill-card" href="' + href + '">'
        + '<div class="skill-card-name">' + esc(skill.name) + '</div>'
        + '<div class="skill-card-category">' + esc(skill.category_label || skill.category || '') + '</div>'
        + '<div class="skill-card-desc">' + esc(skill.description || '') + '</div>'
        + '<div class="skill-card-meta">'
        + (tested ? '<span class="skill-card-tested">' + esc(tested) + '</span>' : '')
        + '<div class="skill-card-install-row">'
        + '<span class="skill-card-install">' + esc(install) + '</span>'
        + '<button class="copy-btn" data-copy="' + esc(install).replace(/"/g, '&quot;') + '" title="Copy install command" onclick="event.preventDefault();event.stopPropagation();copyInstall(this)">'
        + '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>'
        + '</button>'
        + '</div>'
        + '</div>'
        + '</a>';
    }).join('');

  }

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }
})();

function copyInstall(btn) {
  const text = btn.getAttribute('data-copy');
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add('copied');
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
    }, 2000);
  });
}

/* ─── SEARCH (Pagefind) ─── */
(function() {
  var searchInput = document.getElementById('search-input');
  var searchResults = document.getElementById('search-results');
  var searchList = document.getElementById('search-results-list');
  var filterBar = document.getElementById('filter-bar');
  var catalogGrid = document.getElementById('catalog-grid');
  var pagefind = null;
  var debounceTimer = null;

  async function loadPagefind() {
    if (pagefind) return pagefind;
    try {
      pagefind = await import('./pagefind/pagefind.js');
      await pagefind.init();
      return pagefind;
    } catch(e) {
      return null;
    }
  }

  searchInput.addEventListener('input', function() {
    clearTimeout(debounceTimer);
    var query = searchInput.value.trim();

    if (!query) {
      searchResults.classList.remove('active');
      filterBar.style.display = '';
      catalogGrid.style.display = '';
      return;
    }

    debounceTimer = setTimeout(async function() {
      var pf = await loadPagefind();
      if (!pf) return;

      var search = await pf.search(query);
      var results = await Promise.all(search.results.slice(0, 12).map(function(r) { return r.data(); }));

      filterBar.style.display = 'none';
      catalogGrid.style.display = 'none';
      searchResults.classList.add('active');

      if (!results.length) {
        searchList.innerHTML = '<div class="search-no-results">No results for "' + query + '"</div>';
        return;
      }

      searchList.innerHTML = results.map(function(r) {
        var url = r.url || '';
        return '<a class="search-result-item skill-card" href="' + url + '">'
          + '<div class="search-result-title">' + (r.meta?.title || url.split('/').pop().replace('.html','')) + '</div>'
          + '<div class="search-result-excerpt">' + (r.excerpt || '') + '</div>'
          + '</a>';
      }).join('');
    }, 200);
  });

  // Clear search on Escape
  searchInput.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      searchInput.value = '';
      searchInput.dispatchEvent(new Event('input'));
      searchInput.blur();
    }
  });
})();

/* ─── MODAL SYSTEM ─── */
(function() {
  var modal = document.getElementById('skill-modal');
  var modalBody = document.getElementById('modal-body');
  var modalClose = document.getElementById('modal-close');
  var originalTitle = document.title;
  var cache = {};

  // Resolve fetch URLs relative to the page's base, not the current pushState URL
  var baseUrl = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);

  function openModal(href) {
    if (cache[href]) {
      showContent(cache[href].html, cache[href].title);
      return;
    }
    modalBody.innerHTML = '<div style="text-align:center;padding:3rem;opacity:0.5;font-family:Cartograph CF,monospace;font-size:0.85rem;text-transform:uppercase">Loading...</div>';
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';

    // Resolve relative to base, not current pushState URL
    var fetchUrl = href.startsWith('./') ? baseUrl + href.substring(2) : href;
    fetch(fetchUrl)
      .then(function(r) { return r.text(); })
      .then(function(html) {
        var parser = new DOMParser();
        var doc = parser.parseFromString(html, 'text/html');
        var page = doc.querySelector('.detail-page');
        var title = doc.querySelector('title');
        var t = title ? title.textContent : '';
        var h = page ? page.innerHTML : html;
        cache[href] = { html: h, title: t };
        showContent(h, t);
      })
      .catch(function() {
        window.location.href = href;
      });
  }

  function showContent(html, title) {
    modalBody.innerHTML = html;
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
    if (title) document.title = title;
    // Re-bind copy buttons inside modal
    modalBody.querySelectorAll('.copy-btn').forEach(function(btn) {
      btn.onclick = function() { copyInstall(btn); };
    });
  }

  function closeModal() {
    modal.classList.remove('open');
    document.body.style.overflow = '';
    document.title = originalTitle;
    history.pushState(null, '', baseUrl + 'skills.html');
  }

  // Intercept card clicks
  document.addEventListener('click', function(e) {
    var card = e.target.closest('.skill-card');
    if (!card) return;
    // Don't intercept copy button clicks
    if (e.target.closest('.copy-btn')) return;
    e.preventDefault();
    var href = card.getAttribute('href');
    var pushUrl = href.startsWith('./') ? baseUrl + href.substring(2) : href;
    history.pushState({ skill: href }, '', pushUrl);
    openModal(href);
  });

  // Close modal
  modalClose.addEventListener('click', closeModal);
  modal.addEventListener('click', function(e) {
    if (e.target === modal) closeModal();
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && modal.classList.contains('open')) closeModal();
  });

  // Handle browser back/forward
  window.addEventListener('popstate', function() {
    if (modal.classList.contains('open')) {
      closeModal();
    }
  });

  // Open modal if URL is a skill page on load
  if (window.location.pathname.includes('/skill/')) {
    openModal(window.location.pathname);
  }
})();
</script>
