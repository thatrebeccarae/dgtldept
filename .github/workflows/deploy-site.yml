name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'docs/**'
      - 'scripts/collect-metadata.py'
      - 'scripts/generate-skill-pages.py'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate catalog.json
        run: python3 scripts/collect-metadata.py

      - name: Generate skill detail pages
        run: python3 scripts/generate-skill-pages.py

      - name: Install Pagefind
        run: |
          curl -sL "https://github.com/Pagefind/pagefind/releases/download/v1.4.0/pagefind-v1.4.0-x86_64-unknown-linux-musl.tar.gz" -o /tmp/pagefind.tar.gz
          tar -xzf /tmp/pagefind.tar.gz -C /tmp/
          chmod +x /tmp/pagefind

      - name: Index with Pagefind
        run: /tmp/pagefind --site docs

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
